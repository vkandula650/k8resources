apiVersion: v1
kind: Pod
metadata:
 name: env
spec:
 containers:
  - name: nginx
    image: nginx
    ports:
     - containerPort: 80
    env:
    - name: course
      valueFrom:
       configMapKeyRef:
        name: course-onfig
        key: course
    - name: duration
      valueFrom:
       configMapKeyRef:
        name: course-onfig
        key: duration
